<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Siriel Macroquad</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        html, body, canvas {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #glcanvas {
            outline: none;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas" tabindex="0"></canvas>
    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    <script>
        load("siriel.wasm");
        // Ensure canvas has focus for keyboard input
        document.getElementById('glcanvas').focus();
    </script>
</body>
</html>
